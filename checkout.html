<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cart</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:30px;}
.item{background:white;margin:10px 0;padding:15px;border-radius:10px;display:flex;justify-content:space-between;}
button{margin:2px;}
</style>
</head>

<body>

<h2>🛒 Your Cart</h2>
<div id="items"></div>
<h3 id="total"></h3>

<script>
let user = localStorage.getItem("user");
let key = "cart_"+user;

let cart = JSON.parse(localStorage.getItem(key)) || [];

function render(){

let div = document.getElementById("items");
div.innerHTML="";
let total=0;

cart.forEach((item,i)=>{

total += item.price * item.qty;

div.innerHTML += `
<div class="item">
<div>${item.name} <br>$${item.price} x ${item.qty}</div>
<div>
<button onclick="plus(${i})">+</button>
<button onclick="minus(${i})">-</button>
<button onclick="del(${i})">❌</button>
</div>
</div>
`;
});

document.getElementById("total").innerText="Total: $"+total;
localStorage.setItem(key,JSON.stringify(cart));
}

function plus(i){ cart[i].qty++; render(); }
function minus(i){ cart[i].qty--; if(cart[i].qty<=0) cart.splice(i,1); render(); }
function del(i){ cart.splice(i,1); render(); }

render();
</script>

</body>
</html>
