<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;background:#f5f5f5;font-family:Arial;}
.box{background:white;padding:30px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1);}
input,button{width:100%;padding:10px;margin:10px 0;}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>
<input id="user" placeholder="Username">
<button onclick="login()">Login</button>
</div>

<script>
function login(){
let user = document.getElementById("user").value;

if(user===""){ alert("Enter username"); return; }

localStorage.setItem("user",user);

if(!localStorage.getItem("cart_"+user)){
localStorage.setItem("cart_"+user,JSON.stringify([]));
}

window.location="index.html";
}
</script>

</body>
</html>
